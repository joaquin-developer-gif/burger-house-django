{% extends 'base.html' %}

{% block title %}Eliminar categoría | {{ nombre_sitio }}{% endblock %}

{% block content %}

<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card shadow border-0">
                <div class="card-body p-4 text-center">

                    <h2 class="fw-bold mb-3">Eliminar categoría</h2>

                    <p class="lead">
                        ¿Seguro que querés eliminar la categoría
                        <strong>{{ categoria.nombre }}</strong>?
                    </p>

                    <p class="text-muted">
                        Esta acción no se puede deshacer.
                    </p>

                    <form method="post">
                        {% csrf_token %}

                        <div class="d-flex gap-2">
                            <a href="{% url 'lista_categorias' %}" class="btn btn-outline-dark w-50">
                                Cancelar
                            </a>

                            <button type="submit" class="btn btn-danger fw-bold w-50">
                                Sí, eliminar
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</section>

{% endblock %}
