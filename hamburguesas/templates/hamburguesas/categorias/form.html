{% extends 'base.html' %}

{% block title %}{{ titulo }} | {{ nombre_sitio }}{% endblock %}

{% block content %}

<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card shadow border-0">
                <div class="card-body p-4">

                    <h2 class="text-center fw-bold mb-4">{{ titulo }}</h2>

                    <form method="post">
                        {% csrf_token %}

                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    {{ field.label }}
                                </label>

                                {{ field }}

                                {% if field.errors %}
                                    <div class="text-danger small mt-1">
                                        {{ field.errors }}
                                    </div>
                                {% endif %}
                            </div>
                        {% endfor %}

                        <div class="d-flex gap-2">
                            <a href="{% url 'lista_categorias' %}" class="btn btn-outline-dark w-50">
                                Cancelar
                            </a>

                            <button type="submit" class="btn btn-warning fw-bold w-50">
                                {{ boton }}
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</section>

{% endblock %}
